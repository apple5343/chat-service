services:
  redis:
    image: redis:alpine
    container_name: redis_chat_test
    ports:
      - "6379:6379"
    networks:
      - chat-network-test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  mongo:
    image: mongo:latest
    container_name: mongo_chat_test
    ports:
      - "27017:27017"
    networks:
      - chat-network-test
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
  
  chat:
    build: .
    container_name: chat_test
    env_file:
      - ./test.env
    ports:
      - "50051:50051"
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - chat-network-test
  
networks:
  chat-network-test:
    driver: bridge